name: meitorrent
description: "Production-grade Android torrent client powered by libtorrent 2.0"
publish_to: "none"
version: 1.0.3+4

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Crashlytics
  firebase_core: ^3.10.1
  firebase_crashlytics: ^4.3.1

  # Torrent engine
  libtorrent_flutter: ^1.8.5
  ffi: ^2.1.3

  # Background service
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^18.0.1

  # Database
  drift: ^2.22.1
  drift_flutter: ^0.2.4
  sqlite3_flutter_libs: ^0.5.42

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  hooks_riverpod: ^2.6.1
  flutter_hooks: ^0.20.5

  # File + storage
  file_picker: ^8.1.3
  open_filex: ^4.7.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Permissions
  permission_handler: ^11.3.1

  # Network connectivity (for WiFi-only mode)
  connectivity_plus: ^6.1.1

  # Device info (for OEM battery guard)
  device_info_plus: ^10.1.0

  # UI
  google_fonts: ^6.2.1

  # Deep linking (magnet:// + .torrent files from browser)
  app_links: ^6.3.4

  # Utilities
  collection: ^1.19.0
  equatable: ^2.0.5
  logger: ^2.4.0
  package_info_plus: ^8.1.2
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Code generation
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.1

  # Testing
  mocktail: ^1.0.4

  # Launcher icons
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  image_path_android: "assets/images/icon_android.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FAF6EE"
  adaptive_icon_foreground: "assets/images/icon_android_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - PRIVACY_POLICY.md
    - TERMS.md
    - LICENSES.md
    - google_fonts/
    - assets/images/
    - assets/images/app_logo.png
    - assets/images/icon_android.png
