name: meitorrent
description: "Production-grade Android torrent client powered by libtorrent 2.0"
publish_to: "none"
version: 1.0.5+6

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # Firebase & Crashlytics
  firebase_core: ^4.9.0
  firebase_crashlytics: ^5.2.2

  # Torrent engine
  libtorrent_flutter: ^1.8.5
  ffi: ^2.1.3

  # Background service
  flutter_foreground_task: ^9.2.2
  flutter_local_notifications: ^21.0.0

  # Database (sqlite3_flutter_libs removed — drift_flutter bundles SQLite3)
  drift: ^2.33.0
  drift_flutter: ^0.3.0

  # State management
  flutter_riverpod: ^3.3.1
  riverpod_annotation: ^4.0.2
  hooks_riverpod: ^3.3.1
  flutter_hooks: ^0.21.3+1

  # File + storage
  file_picker: ^12.0.0-beta.3
  open_filex: ^4.7.0
  path_provider: ^2.1.4
  path: ^1.9.0

  # Permissions
  permission_handler: ^12.0.1

  # Network connectivity (for WiFi-only mode)
  connectivity_plus: ^7.1.1

  # Device info (for OEM battery guard)
  device_info_plus: ^13.1.0

  # UI
  flutter_animate: ^4.5.0
  gap: ^3.0.1

  # Deep linking (magnet:// + .torrent files from browser)
  app_links: ^7.0.0

  # Utilities
  collection: ^1.19.0
  equatable: ^2.0.5
  logger: ^2.4.0
  package_info_plus: ^10.1.0
  shared_preferences: ^2.5.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  riverpod_generator: ^4.0.3

  # Testing
  mocktail: ^1.0.4

  # Launcher icons
  flutter_launcher_icons: ^0.14.4
flutter_launcher_icons:
  android: true
  image_path_android: "assets/images/icon_android.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FAF6EE"
  adaptive_icon_foreground: "assets/images/icon_android_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - PRIVACY_POLICY.md
    - TERMS.md
    - LICENSES.md
    - assets/images/
    - assets/images/app_logo.png
    - assets/images/icon_android.png

  fonts:
    - family: ShipporiMincho
      fonts:
        - asset: assets/fonts/ShipporiMincho-Regular.ttf
          weight: 400
        - asset: assets/fonts/ShipporiMincho-Bold.ttf
          weight: 700
    - family: Outfit
      fonts:
        - asset: google_fonts/Outfit-Regular.ttf
          weight: 400
        - asset: google_fonts/Outfit-Medium.ttf
          weight: 500
        - asset: google_fonts/Outfit-Bold.ttf
          weight: 700
